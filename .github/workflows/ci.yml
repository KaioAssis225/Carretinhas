name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, tipos, testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (formatação)
        run: ruff format --check .

      - name: Mypy (tipos)
        run: mypy

      - name: Pytest
        run: pytest

  frontend:
    name: Frontend (lint, tipos, testes, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tipos
        run: npm run typecheck

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build

  docker:
    name: Build da imagem da API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -t assiscarretas-api:ci ./backend
